name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install and build
        run: |
          set -euxo pipefail
          node --version
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
          pnpm --version
          pnpm install --frozen-lockfile=false
          GITHUB_PAGES=true pnpm run build
